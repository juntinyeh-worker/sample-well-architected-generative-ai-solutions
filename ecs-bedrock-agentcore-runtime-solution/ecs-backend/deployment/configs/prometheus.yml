# COA AgentCore Backend Monitoring Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'coa-agentcore'
    static_configs:
      - targets: ['coa-agentcore:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'agentcore'

  - job_name: 'coa-health-checks'
    static_configs:
      - targets: ['coa-agentcore:8000']
    metrics_path: '/health'
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
